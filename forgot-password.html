<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="logIn.css">

    <!-- ✅ EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        /* ── خطوات ── */
        .steps {
            display: flex; align-items: center;
            margin-bottom: 28px;
        }
        .step {
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            flex: 1; font-size: 12px; color: var(--muted);
            transition: color 0.3s;
        }
        .step-circle {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            background: var(--input-bg);
            transition: all 0.3s;
        }
        .step.active .step-circle { border-color: var(--green); background: var(--green); color: #fff; }
        .step.done   .step-circle { border-color: var(--green-dark); background: var(--green-dark); color: #fff; }
        .step-line { flex: 1; height: 2px; background: var(--border); transition: background 0.3s; }
        .step-line.done { background: var(--green); }

        /* ── أقسام ── */
        .step-section { display: none; }
        .step-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateX(-8px); }
            to   { opacity:1; transform:translateX(0); }
        }

        /* ── OTP ── */
        .otp-wrapper { display: flex; gap: 10px; direction: ltr; justify-content: center; }
        .otp-input {
            width: 52px; height: 56px;
            text-align: center; font-size: 22px; font-weight: 800;
            border-radius: 12px;
            background: var(--input-bg); border: 2px solid var(--border);
            color: var(--text); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .otp-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
        }
        .otp-input.filled { border-color: var(--green); }

        /* ── Hint ── */
        .hint {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 10px; padding: 12px 14px;
            font-size: 13px; color: #86efac;
            margin-bottom: 18px;
            display: flex; gap: 8px; align-items: flex-start;
        }

        /* ── رسالة خطأ ── */
        .error-msg {
            background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f87171;
            display: none; align-items: center; gap: 8px; margin-bottom: 14px;
        }
        .error-msg.show { display: flex; }

        /* ── Resend ── */
        .resend { text-align: center; margin-top: 10px; font-size: 13px; color: var(--muted); }
        .resend button {
            background: none; border: none; color: var(--green);
            cursor: pointer; font-family: 'Tajawal',sans-serif;
            font-size: 13px; font-weight: 600;
        }
        .resend button:disabled { color: var(--muted); cursor: not-allowed; }
        .resend span { color: var(--green); font-weight: 700; }

        /* ── نجاح ── */
        .success-screen { text-align: center; padding: 16px 0; }
        .big-icon { font-size: 54px; margin-bottom: 14px; animation: bounce 0.5s ease; display: block; }
        @keyframes bounce {
            0%  { transform:scale(0.5); opacity:0; }
            70% { transform:scale(1.1); }
            100%{ transform:scale(1);   opacity:1; }
        }

        /* ── حقل كلمة المرور ── */
        .pass-wrapper { position: relative; }
        .pass-wrapper input { padding-left: 44px !important; }
        .pass-toggle {
            position: absolute; left:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer;
            font-size:16px; color:var(--muted);
        }
        .pass-toggle:hover { color: var(--green); }

        /* strength */
        .strength-bar { height:4px; background:var(--border); border-radius:999px; margin-top:6px; overflow:hidden; }
        .strength-fill { height:100%; width:0%; border-radius:999px; transition:width 0.3s,background 0.3s; }
        .strength-lbl { font-size:11px; color:var(--muted); margin-top:3px; display:block; }

        /* spinner على الزر */
        .btn-primary .spinner {
            display: inline-block; width:16px; height:16px;
            border:2px solid rgba(255,255,255,0.4);
            border-top-color:#fff;
            border-radius:50%;
            animation: spin 0.7s linear infinite;
            margin-left: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">🔑</div>
    <h2>استعادة كلمة المرور</h2>
    <p class="subtitle">سنرسل رمز تحقق حقيقي لبريدك الإلكتروني</p>

    <!-- خطوات -->
    <div class="steps">
        <div class="step active" id="s1"><div class="step-circle">1</div><span>الإيميل</span></div>
        <div class="step-line" id="l1"></div>
        <div class="step"      id="s2"><div class="step-circle">2</div><span>التحقق</span></div>
        <div class="step-line" id="l2"></div>
        <div class="step"      id="s3"><div class="step-circle">3</div><span>كلمة المرور</span></div>
        <div class="step-line" id="l3"></div>
        <div class="step"      id="s4"><div class="step-circle">✓</div><span>تم</span></div>
    </div>

    <!-- رسالة خطأ -->
    <div class="error-msg" id="error-msg">
        <span>⚠️</span><span id="error-text"></span>
    </div>

    <!-- ── STEP 1: الإيميل ── -->
    <div class="step-section active" id="sec1">
        <div class="field">
            <label for="fp-email">البريد الإلكتروني</label>
            <div class="input-wrapper">
                <span class="input-icon">📧</span>
                <input type="email" id="fp-email" placeholder="example@email.com" required>
            </div>
        </div>
        <button class="btn-primary" id="btn-send" onclick="sendOTP()">
            إرسال رمز التحقق
        </button>
    </div>

    <!-- ── STEP 2: التحقق ── -->
    <div class="step-section" id="sec2">
        <div class="hint">
            <span>📧</span>
            <span>تم إرسال رمز مكوّن من 6 أرقام إلى بريدك. تحقق من صندوق الوارد أو Spam.</span>
        </div>
        <div class="field">
            <label>رمز التحقق</label>
            <div class="otp-wrapper" id="otp-wrapper">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            </div>
        </div>
        <div class="resend">
            لم يصلك الرمز؟
            <button id="resend-btn" onclick="resendOTP()" disabled>
                إعادة الإرسال (<span id="countdown">60</span>ث)
            </button>
        </div>
        <button class="btn-primary" onclick="verifyOTP()" style="margin-top:18px;">تحقق من الرمز</button>
    </div>

    <!-- ── STEP 3: كلمة المرور الجديدة ── -->
    <div class="step-section" id="sec3">
        <div class="field">
            <label for="new-pass">كلمة المرور الجديدة</label>
            <div class="input-wrapper pass-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="new-pass" placeholder="أدخل كلمة المرور الجديدة" oninput="checkStrength()">
                <button type="button" class="pass-toggle" onclick="togglePass('new-pass',this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="sf"></div></div>
            <span class="strength-lbl" id="sl"></span>
        </div>
        <div class="field">
            <label for="confirm-pass">تأكيد كلمة المرور</label>
            <div class="input-wrapper pass-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="confirm-pass" placeholder="أعد كتابة كلمة المرور">
                <button type="button" class="pass-toggle" onclick="togglePass('confirm-pass',this)">👁</button>
            </div>
        </div>
        <button class="btn-primary" onclick="resetPassword()">تعيين كلمة المرور الجديدة</button>
    </div>

    <!-- ── STEP 4: تم ── -->
    <div class="step-section" id="sec4">
        <div class="success-screen">
            <span class="big-icon">✅</span>
            <h2 style="margin-bottom:8px;">تم تغيير كلمة المرور!</h2>
            <p style="color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:24px;">
                يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.
            </p>
            <button class="btn-primary" onclick="location.href='logIn.html'">
                🚀 تسجيل الدخول
            </button>
        </div>
    </div>

    <a href="logIn.html" class="forgot" style="display:block;text-align:center;margin-top:20px;">
        ← العودة لتسجيل الدخول
    </a>
</div>

<script src="db.js"></script>
<script>
// ============================================================
//  ⚙️ إعدادات EmailJS — ضع بياناتك هنا
// ============================================================
const EMAILJS_PUBLIC_KEY  = 'gUGNtKSaED3ZHoazy';    // من emailjs.com → Account
const EMAILJS_SERVICE_ID  = 'service_qrbyio5';    // من EmailJS → Email Services
const EMAILJS_TEMPLATE_ID = 'template_zz1pqpb';   // من EmailJS → Email Templates

// ============================================================
//  STATE
// ============================================================
let generatedOTP  = '';
let otpExpiry     = 0;      // timestamp انتهاء صلاحية الرمز
let timerInterval = null;
let targetEmail   = '';

// ============================================================
//  INIT EMAILJS
// ============================================================
emailjs.init(EMAILJS_PUBLIC_KEY);

// ============================================================
//  OTP INPUTS — انتقال تلقائي
// ============================================================
const otpInputs = document.querySelectorAll('.otp-input');
otpInputs.forEach((input, i) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g,'');
        if (input.value && i < otpInputs.length - 1) otpInputs[i+1].focus();
        input.classList.toggle('filled', !!input.value);
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) otpInputs[i-1].focus();
    });
    input.addEventListener('paste', e => {
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
        if (paste.length >= 6) {
            paste.slice(0,6).split('').forEach((ch, j) => {
                if (otpInputs[j]) { otpInputs[j].value = ch; otpInputs[j].classList.add('filled'); }
            });
            otpInputs[5].focus();
            e.preventDefault();
        }
    });
});

// ============================================================
//  HELPERS
// ============================================================
function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
}

function hideError() { document.getElementById('error-msg').classList.remove('show'); }

function setStep(n) {
    for (let i=1; i<=4; i++) {
        document.getElementById(`sec${i}`).classList.toggle('active', i === n);
        const s = document.getElementById(`s${i}`);
        s.classList.remove('active','done');
        if (i === n) s.classList.add('active');
        if (i < n)  s.classList.add('done');
    }
    for (let i=1; i<=3; i++) {
        document.getElementById(`l${i}`).classList.toggle('done', i < n);
    }
    hideError();
}

function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    btn.innerHTML = loading
        ? 'جارٍ الإرسال...<span class="spinner"></span>'
        : 'إرسال رمز التحقق';
}

function generateOTP() {
    return String(Math.floor(100000 + Math.random() * 900000));
}

// ============================================================
//  STEP 1 — إرسال OTP
// ============================================================
async function sendOTP() {
    const email = document.getElementById('fp-email').value.trim();
    if (!email || !email.includes('@')) { showError('أدخل بريداً إلكترونياً صحيحاً'); return; }

    // تحقق أن الإيميل مسجل في النظام
    const accounts = JSON.parse(localStorage.getItem('app_accounts') || '{}');
    const user = Object.values(accounts).find(a => a.email === email.toLowerCase());
    if (!user) { showError('هذا البريد الإلكتروني غير مسجل في النظام'); return; }

    targetEmail  = email.toLowerCase();
    generatedOTP = generateOTP();
    otpExpiry    = Date.now() + 5 * 60 * 1000; // صالح 5 دقائق

    setLoading('btn-send', true);

    try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email: email,
            to_name:  user.name || 'المستخدم',
            otp_code: generatedOTP,
            app_name: 'مهامي',
        });

        setStep(2);
        startCountdown();
        otpInputs[0].focus();

    } catch (err) {
        console.error('EmailJS error:', err);
        showError('فشل إرسال الرمز. تحقق من إعدادات EmailJS.');
    } finally {
        setLoading('btn-send', false);
    }
}

// ============================================================
//  COUNTDOWN TIMER
// ============================================================
function startCountdown() {
    let secs = 60;
    const btn = document.getElementById('resend-btn');
    const cnt = document.getElementById('countdown');
    btn.disabled = true;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        secs--;
        cnt.textContent = secs;
        if (secs <= 0) {
            clearInterval(timerInterval);
            btn.disabled = false;
            btn.innerHTML = 'إعادة الإرسال';
        }
    }, 1000);
}

async function resendOTP() {
    otpInputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
    otpInputs[0].focus();
    generatedOTP = generateOTP();
    otpExpiry    = Date.now() + 5 * 60 * 1000;
    const accounts = JSON.parse(localStorage.getItem('app_accounts') || '{}');
    const user = Object.values(accounts).find(a => a.email === targetEmail);
    try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
            to_email: targetEmail,
            to_name:  user?.name || 'المستخدم',
            otp_code: generatedOTP,
            app_name: 'مهامي',
        });
        startCountdown();
        alert('✅ تم إعادة إرسال الرمز!');
    } catch (err) {
        showError('فشل إعادة الإرسال.');
    }
}

// ============================================================
//  STEP 2 — التحقق من OTP
// ============================================================
function verifyOTP() {
    const entered = Array.from(otpInputs).map(i => i.value).join('');
    if (entered.length < 6) { showError('أدخل الرمز المكوّن من 6 أرقام كاملاً'); return; }
    if (Date.now() > otpExpiry) { showError('انتهت صلاحية الرمز. أعد الإرسال.'); return; }
    if (entered !== generatedOTP) { showError('الرمز غير صحيح. حاول مجدداً.'); otpInputs.forEach(i=>{i.value='';i.classList.remove('filled');}); otpInputs[0].focus(); return; }
    clearInterval(timerInterval);
    setStep(3);
    document.getElementById('new-pass').focus();
}

// ============================================================
//  STEP 3 — تعيين كلمة المرور الجديدة
// ============================================================
function checkStrength() {
    const val = document.getElementById('new-pass').value;
    const fill = document.getElementById('sf');
    const lbl  = document.getElementById('sl');
    let s = 0;
    if (val.length >= 6) s++;
    if (val.length >= 10) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    const lvls = [
        {p:'0%',   c:'#e2e8f0', t:''},
        {p:'25%',  c:'#ef4444', t:'ضعيفة جداً'},
        {p:'50%',  c:'#f59e0b', t:'ضعيفة'},
        {p:'70%',  c:'#3b82f6', t:'متوسطة'},
        {p:'85%',  c:'#22c55e', t:'قوية'},
        {p:'100%', c:'#16a34a', t:'قوية جداً ✅'},
    ];
    const l = lvls[Math.min(s,5)];
    fill.style.width = l.p; fill.style.background = l.c;
    lbl.textContent  = l.t; lbl.style.color = l.c;
}

function togglePass(id, btn) {
    const input = document.getElementById(id);
    input.type  = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

function resetPassword() {
    const newPass  = document.getElementById('new-pass').value;
    const confirm  = document.getElementById('confirm-pass').value;

    if (!newPass)              { showError('أدخل كلمة المرور الجديدة'); return; }
    if (newPass.length < 6)   { showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
    if (newPass !== confirm)   { showError('كلمتا المرور غير متطابقتين'); return; }

    // تحديث كلمة المرور في db.js / localStorage
    const accounts = JSON.parse(localStorage.getItem('app_accounts') || '{}');
    const uid = Object.keys(accounts).find(k => accounts[k].email === targetEmail);
    if (!uid) { showError('حدث خطأ، حاول مجدداً'); return; }

    // تشفير نفس طريقة db.js
    accounts[uid].password = btoa(unescape(encodeURIComponent(newPass)));
    localStorage.setItem('app_accounts', JSON.stringify(accounts));

    setStep(4);
}
</script>
</body>
</html>
