<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="logIn.css">
    <style>
        .error-msg {
            background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
            border-radius:10px; padding:10px 14px;
            font-size:13px; color:#f87171;
            display:none; align-items:center; gap:8px;
            margin-bottom: 16px;
        }
        .error-msg.show { display:flex; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">🔐</div>
    <h2>مرحبًا بعودتك!</h2>
    <p class="subtitle">سجّل الدخول للمتابعة إلى حسابك</p>

    <div class="error-msg" id="error-msg">
        <span>⚠️</span><span id="error-text"></span>
    </div>

    <div class="field">
        <label for="login-email">البريد الإلكتروني</label>
        <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="login-email" placeholder="example@email.com" required>
        </div>
    </div>

    <div class="field">
        <label for="login-pass">كلمة المرور</label>
        <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-pass" placeholder="أدخل كلمة المرور" required>
            <button type="button" class="toggle-password" onclick="togglePass()">👁</button>
        </div>
        <a href="forgot-password.html" class="forgot">نسيت كلمة المرور؟</a>
    </div>

    <button class="btn-primary" onclick="handleLogin()">تسجيل الدخول</button>

    <div class="divider">أو</div>

    <p class="register-link">ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a></p>
</div>

<script src="db.js"></script>
<script>
    // Redirect if already logged in
    if (DB.isLoggedIn()) window.location.href = 'home.html';

    function togglePass() {
        const input = document.getElementById('login-pass');
        const btn   = document.querySelector('.toggle-password');
        input.type  = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        document.getElementById('error-text').textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    function handleLogin() {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-pass').value;

        if (!email || !password) { showError('يرجى ملء جميع الحقول'); return; }

        const result = DB.login(email, password);
        if (!result.success) { showError(result.error); return; }

        // Apply saved dark mode preference
        if (DB.getDarkMode()) document.body.classList.add('dark');

        window.location.href = 'home.html';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
